<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form in HTML</title>
</head>
<body>
    
<h1>HTML Forms</h1>

<form>
    <!-- class activity -->

    <label for="name">Username:</label> <br> 
    <input type="text" id="name" readonly value="Arshad Khan" required> <br> <br>
    <label for="password">Password:</label> <br> 
    <input type="password" name="password" id="password" minlength="3" maxlength="5"> <br> <br>
    <input type="submit">
</form>

<hr>

<!-- class work -->

<form>

     <label for="gender">Gender:</label> <br>
    <input type="radio" name="gender" value="male" >Male
    <input type="radio" name="gender" value="female" >Female

    <br> <br>

    <label for="languages"> Languages: </label> <br>
    <input type="checkbox" name="languages" id="English">
    <label for="English">English</label>
    <input type="checkbox" name="languages">Urdu
    <input type="checkbox" name="languages">Hindi
    <br> 

    <br> <br>

    <label for="countries">Countries:</label>
    <select name="Country" id="">
        <option value="anyCountry" selected>Selected Country</option>
        <option value="pak">Pakistan</option>
        <option value="china">China</option>
        <option value="america">America</option>
        <option value="russia">Russia</option>
    </select>
    
    <br> <br>

    <select name="country/city" id="">
        <optgroup label="Pakistan">
            <option value="peshawar">Peshawar</option>
            <option value="islamabad">Islamabad</option>
            <option value="pak/punjab">Punjab</option>
            <option value="karachi">Karachi</option>
        </optgroup>
        <optgroup label="America">
            <option value="newyork">Newyork</option>
            <option value="chegago">Chikago</option>
        </optgroup>
    </select>

    <br> <br>

    <input type="date">
    <input type="datetime-local">
    <br> 
    <input type="color">
    <br> 
    <input type="number">
    <input type="range">
    <br> <br>
    <input type="search">
    <br> <br>
    <input type="week">
    <input type="tel">
    <br> <br>


    <!-- <input type="button" value="Button"> -->
     <!-- <input type="submit"> -->
    <button>Submit</button>
    <!-- <input type="reset">  -->

</form>


<br> <br>

<label for="cars">Choose a car:</label>
<select id="cars">
  <optgroup label="Swedish Cars">
    <option value="volvo">Volvo</option>
    <option value="saab">Saab</option>
  </optgroup>
  <optgroup label="German Cars">
    <option value="mercedes">Mercedes</option>
    <option value="audi">Audi</option>
  </optgroup>
</select>




</body>
</html>

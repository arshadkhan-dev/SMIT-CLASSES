    <!-- class activity -->

    <h1>A Sample HTML Form</h1>

    <form>
        <label for="userId">User Id:</label> <br>
        <input type="text" name="userId" id="UserId" placeholder="steve smith" required> <br> <br>

        <label for="password">Password:</label> <br>
        <input type="password" required> <br> <br>

        <input type="checkbox" name="con" required>Add me to your contact list. <br>
        <input type="checkbox" name="con">Add me to your mailing list. <br> <br>

        <label for="Contact">Contact me by:</label> <br>
        <input type="radio" name="contact" id="contact" >Email
        <input type="radio" name="contact" id="contact">Postal mail
        <input type="radio" name="contact">Both

        <br> <br>
        <input type="submit">
        <input type="reset">
    </form>

    <hr>

      <!-- files (multiple attribute)
      fieldset: used to group elements in form  (legand)
      extra markup
      section (for related elements)
      div (for unrelated elements)
      span (for targeting a specific word or sentence)
      iframe used to display a web page within a web page
      aside
      class 
      id -->

      <form>
        <fieldset>
            <legend>Student Registration Form</legend>
            <label for="name">Username</label>
            <input type="text" name="name" id="name" required autocomplete="off"> <br> <br>
            <label for="password">Password</label> 
            <input type="password" name="password" id="password" required>
            <br> <br>
            <input type="submit">
        </fieldset>
      </form>

      <iframe src="https://www.wikipedia.org/" style="height: 500px;" frameborder="0"></iframe>


</body>
